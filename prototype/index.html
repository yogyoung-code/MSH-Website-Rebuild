<style>
  /* Global font override — Footlight MT as display family */
  :root {
    --font-display: "Footlight MT Light", "Footlight MT", "Footlight MT Std", "Source Serif 4", Georgia, serif;
    --font-slogan:  "Footlight MT Light", "Footlight MT", Georgia, serif;
  }
  html, body { margin: 0; padding: 0; background: var(--bg-1); color: var(--fg-1); font-family: var(--font-ui); }
  *, *::before, *::after { box-sizing: border-box; }
  a { color: inherit; }
  sup { font-size: 0.7em; vertical-align: super; line-height: 0; }
  button { font-family: var(--font-ui); }
  ::selection { background: var(--brand-accent-100); color: var(--brand-primary-700); }
  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }

</style>

<div id="root"></div>

<script type="text/babel">

    const t = setTimeout(() => window.lucide && lucide.createIcons(), 50);

    <div>
