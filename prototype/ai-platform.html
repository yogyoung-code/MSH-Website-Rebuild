        maxWidth: 'var(--container-max, 1280px)',
        margin: '0 auto',

          title="Try the products"
          body="Limited Preview · Apply for access to DeepEvidence, SeekEvidence, or notify me when the next product ships."

}

  const isDark = accent === 'dark';
  return (
    <div style={{
      padding: 'clamp(24px, 3vw, 40px)',
      borderRadius: 16,
      background: isDark ? 'var(--brand-primary-900)' : 'var(--bg-1)',
      border: isDark ? 'none' : '1px solid var(--border-1)',
      color: isDark ? 'var(--white)' : 'var(--fg-1)',
      display: 'flex', flexDirection: 'column', gap: 16,
    }}>
      <div style={{
        fontFamily: 'var(--font-ui)', fontSize: 11,
        letterSpacing: '0.14em', textTransform: 'uppercase',
        color: isDark ? 'var(--brand-accent-500)' : 'var(--brand-accent-700)',
        fontWeight: 700,
      }}>{eyebrow}</div>
      <h3 style={{
        fontFamily: 'var(--font-display)',
        fontSize: 'clamp(24px, 2.8vw, 32px)',
        fontWeight: 600,
        margin: 0,
        lineHeight: 1.2,
        color: isDark ? 'var(--white)' : 'var(--brand-primary-700)',
      }}>{title}</h3>
      <p style={{
        margin: 0,
        fontSize: 14, lineHeight: 1.6,
        color: isDark ? 'rgba(255,255,255,0.78)' : 'var(--fg-2)',
        maxWidth: 480,
      }}>{body}</p>
      <div style={{ marginTop: 'auto', paddingTop: 8 }}>

          display: 'inline-flex', alignItems: 'center', gap: 8,
          padding: '14px 28px', borderRadius: 10,
          background: isDark ? 'var(--white)' : 'var(--brand-primary-700)',
          color: isDark ? 'var(--brand-primary-700)' : 'var(--white)',
          fontFamily: 'var(--font-ui)', fontSize: 14, fontWeight: 700,
          textDecoration: 'none',
        }}>{ctaLabel}</a>
      </div>
    </div>
