<meta property="og:title" content="Insights — MedSci Healthcare">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ItemList",
  "name": "MedSci Healthcare Insights",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "url": "https://medscihealthcare.com/insights/china-rwe-regulatory-landscape" },
    { "@type": "ListItem", "position": 2, "url": "https://medscihealthcare.com/insights/bridging-china-data-fda" },
    { "@type": "ListItem", "position": 3, "url": "https://medscihealthcare.com/insights/named-patient-programs-china" },
    { "@type": "ListItem", "position": 4, "url": "https://medscihealthcare.com/insights/medical-affairs-2030" },
    { "@type": "ListItem", "position": 5, "url": "https://medscihealthcare.com/insights/ai-driven-medical-affairs" },
    { "@type": "ListItem", "position": 6, "url": "https://medscihealthcare.com/insights/hcp-engagement-connected-channels" }
  ]
}
</script>
<style>
  :root {
    --font-display: "Footlight MT Light", "Footlight MT", "Source Serif 4", Georgia, serif;
    --font-slogan: "Footlight MT Light", "Footlight MT", Georgia, serif;
  }
html, body { margin: 0; padding: 0; background: var(--bg-1); color: var(--fg-1); font-family: var(--font-ui); }
  *, *::before, *::after { box-sizing: border-box; }
  a { color: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="../assets/vendor/react.development.js"></script>
<script src="../assets/vendor/react-dom.development.js"></script>
<script src="../assets/vendor/babel.min.js"></script>
<script src="../assets/vendor/lucide.min.js"></script>

<script type="text/babel" src="../components/Button.jsx"></script>
<script type="text/babel" src="../components/Header.jsx"></script>
<script type="text/babel" src="../components/Footer.jsx"></script>
<script type="text/babel" src="../components/PageShell.jsx?v=2"></script>
<script type="text/babel" src="../components/ContentBlocks.jsx"></script>
<script type="text/babel" src="../components/InsightCard.jsx"></script>
<script type="text/babel" src="../components/TopicChips.jsx"></script>
<!-- Sanity CMS integration -->
<script src="https://cdn.jsdelivr.net/npm/@sanity/client@6/dist/sanityClient.browser.min.js"></script>
<script src="../assets/sanity-client.js"></script>
<script type="text/babel" src="../components/useSanity.jsx"></script>

<script type="text/babel">
const TOPICS = [
  { value: 'rwe',              label: 'China RWE' },
  { value: 'evidence_bridge',  label: 'FDA Evidence Bridge' },
  { value: 'china_access',     label: 'China Market Access' },
  { value: 'med_affairs',      label: 'Medical Affairs' },
  { value: 'ai_health',        label: 'AI in Healthcare' },
  { value: 'hcp_engagement',   label: 'HCP Engagement' }
];

const INSIGHTS = [
  {
    slug: 'china-rwe-regulatory-landscape',
    topic: TOPICS[0],
    title: "Evolving RWE Policies in China: What Global Sponsors Need to Know",
    lede: "Since 2019, China's NMPA and CDE have issued a series of guidelines that formalize how real-world evidence can support drug registration. We map the current policy landscape, highlight the key use cases Chinese regulators have accepted, and outline what this means for sponsors planning cross-border submissions.",
    author:        { name: 'Dr. L. Chen', title: 'Medical Director, Evidence' },
    pitlReviewer:  { name: 'Dr. M. Park', title: 'Senior Reviewer, PITL' },
    publishedAt:   '2026-04-28',
    readingTime:   '7 min read'
  },
  {
    slug: 'bridging-china-data-fda',
    topic: TOPICS[1],
    title: 'Bridging China-Generated Data to an FDA Submission: A Field Checklist',
    lede: "China's 2024 State Council reform opinions accelerated clinical trial approvals from 60 to 30 working days and endorsed international multi-center trials. For sponsors bridging Chinese data into U.S. submissions, these changes rewrite the playbook. We share the gating questions our reviewers run before a U.S.-facing dossier gets drafted.",
    author:        { name: 'Dr. R. Iyer', title: 'Medical Director, U.S. Programs' },
    pitlReviewer:  { name: 'Dr. K. Liu',  title: 'Senior Reviewer, PITL' },
    publishedAt:   '2026-04-21',
    readingTime:   '8 min read'
  },
  {
    slug: 'named-patient-programs-china',
    topic: TOPICS[2],
    title: "Named Patient Programs: A New Pathway into China for Innovative Therapies",
    lede: "Hainan's Boao Lecheng pilot zone and the 2019 Drug Administration Law have opened a named-patient route for overseas-approved drugs to reach Chinese patients before full NMPA registration. We examine how the pathway works, where it applies, and what global sponsors should prepare before filing.",
    author:        { name: 'Dr. S. Tan',  title: 'Medical Director, Market Access' },
    pitlReviewer:  { name: 'Dr. J. Wang', title: 'Senior Reviewer, PITL' },
    publishedAt:   '2026-04-14',
    readingTime:   '6 min read'
  },
  {
    slug: 'medical-affairs-2030',
    topic: TOPICS[3],
    title: 'Medical Affairs 2030: Five Priorities for the AI Era',
    lede: "Medical affairs teams are under pressure to deliver more with less — shorter timelines, broader stakeholder expectations, and exponentially growing data volumes. We review five strategic priorities that will define the function by 2030, and where AI will make the biggest difference.",
    author:        { name: 'Dr. K. Liu',  title: 'Senior Reviewer, Medical Strategy' },
    pitlReviewer:  { name: 'Dr. L. Chen', title: 'Medical Director, Evidence' },
    publishedAt:   '2026-04-07',
    readingTime:   '7 min read'
  },
  {
    slug: 'ai-driven-medical-affairs',
    topic: TOPICS[4],
    title: 'AI-Driven Decision Making in Medical Affairs: From Literature to Action',
    lede: "Generative AI and predictive analytics are already reshaping how medical affairs teams screen literature, identify key opinion leaders, and generate compliant content. We examine the practical applications that are delivering measurable value today — and the governance guardrails that make adoption sustainable.",
    author:        { name: 'Dr. M. Park', title: 'Senior Reviewer, AI & Evidence' },
    pitlReviewer:  { name: 'Dr. R. Iyer', title: 'Medical Director, U.S. Programs' },
    publishedAt:   '2026-03-31',
    readingTime:   '6 min read'
  },
  {
    slug: 'hcp-engagement-connected-channels',
    topic: TOPICS[5],
    title: 'HCP Engagement in 2025: Why Connected Channels Win',
    lede: "With fewer than half of healthcare professionals now accessible to field teams, the traditional single-channel rep model is breaking down. New data from global surveys shows that coordinated engagement across sales, medical, and digital channels delivers measurably better outcomes. We analyze what this means for pharma engagement strategy in China and beyond.",
    author:        { name: 'Dr. S. Tan',  title: 'Medical Director, Communications' },
    pitlReviewer:  { name: 'Dr. K. Liu',  title: 'Senior Reviewer, PITL' },
    publishedAt:   '2026-03-24',
    readingTime:   '5 min read'
  }
];

// Transform Sanity insight → component props
function transformCmsInsight(doc) {
  const L = window.MSHContent ? window.MSHContent.L : (o) => (o && o.en) || o || '';
  const typeToTopic = { regulatory: TOPICS[0], evidence_bridge: TOPICS[1], china_access: TOPICS[2], medical_affairs: TOPICS[3], ai_health: TOPICS[4], hcp_engagement: TOPICS[5], operations: TOPICS[3] };
  return {
    slug: doc.slug && doc.slug.current ? doc.slug.current : doc.slug,
    topic: typeToTopic[doc.type] || TOPICS[0],
    title: L(doc.title),
    lede: L(doc.summary),
    author: doc.authors && doc.authors[0] ? { name: L(doc.authors[0].name), title: doc.authors[0].role } : {},
    pitlReviewer: {},
    publishedAt: doc.publishedAt ? doc.publishedAt.slice(0, 10) : '',
    readingTime: doc.readTime ? doc.readTime + ' min read' : ''
  };
}

function App() {
  // Multi-select: empty array = show all
  const [activeTopics, setActiveTopics] = React.useState([]);

  // Fetch from Sanity, fall back to mock
  const cmsData = useSanity('fetchInsights', null);
  const allInsights = cmsData
    ? cmsData.map(transformCmsInsight)
    : INSIGHTS;

  const toggleTopic = (v) => {
    setActiveTopics(prev => prev.indexOf(v) === -1 ? [...prev, v] : prev.filter(x => x !== v));
  };

  const visible = activeTopics.length === 0
    ? allInsights
    : allInsights.filter(i => activeTopics.indexOf(i.topic.value) !== -1);

  return (
    <PageShell
      eyebrow="Insights"
      title="Field notes from where evidence, regulators, and physicians meet."
      subtitle="Short briefings written by our physicians and reviewed under the PITL workflow we use for client work. No vendor takes; just what we're seeing in China RWE, U.S. submissions, and bilingual medical content."
      breadcrumbs={[{ label: 'Home', href: '/' }, { label: 'Insights' }]}
    >
      <TopicChips
        topics={TOPICS}
        active={activeTopics}
        onToggle={toggleTopic}
      />

      <section style={{ padding: '0 clamp(24px, 6vw, 96px) 64px', maxWidth: 1280, margin: '0 auto' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: 24 }}>
          {visible.map(i => (
            <InsightCard
              key={i.slug}
              {...i}
              href={`${i.slug}.html`}
            />
          ))}
        </div>
        {visible.length === 0 && (
          <div style={{ textAlign: 'center', color: 'var(--fg-3)', padding: 48 }}>
            No insights match the selected topics.
          </div>
        )}
      </section>

      {/* Subscribe module — Copy Deck v4.2 §8.0.5 */}
      <section id="subscribe" style={{
        background: 'var(--bg-2)',
        borderTop: '1px solid var(--border-1)',
        padding: '64px clamp(24px, 6vw, 96px)'
      }}>
        <div style={{ maxWidth: 720, margin: '0 auto', textAlign: 'center' }}>
          <div style={{
            fontFamily: 'var(--font-slogan)',
            fontSize: 12,
            letterSpacing: '0.12em',
            textTransform: 'uppercase',
            color: 'var(--brand-accent-700)',
            marginBottom: 12
          }}>Stay in the loop</div>
          <h2 style={{
            fontFamily: 'var(--font-display)',
            fontSize: 32,
            margin: '0 0 12px',
            color: 'var(--brand-primary-700)',
            lineHeight: 1.2
          }}>
            One short briefing a month — when it's worth your inbox.
          </h2>
          <p style={{
            fontSize: 15,
            color: 'var(--fg-2)',
            lineHeight: 1.6,
            margin: '0 0 24px'
          }}>
            No marketing newsletter. We send a single Insight per month, written by a physician, reviewed under PITL. Cancel anytime.
          </p>
          <SubscribeForm topics={TOPICS} />
          <p style={{ fontSize: 12, color: 'var(--fg-3)', marginTop: 16 }}>
            By subscribing you agree to our <a href="/legal/privacy.html" style={{ color: 'var(--fg-link)', textDecoration: 'underline' }}>Privacy Policy</a>. We do not share your email with third parties.
          </p>
        </div>
      </section>
    </PageShell>
  );
}

function SubscribeForm({ topics }) {

  // email validation, button disabled during submit.
  const [email, setEmail] = React.useState('');
  const [emailError, setEmailError] = React.useState('');
  // Default to FIRST topic only — opt-in, not opt-out (P2 finding: was all-on by default).
  const [selected, setSelected] = React.useState(topics.length > 0 ? [topics[0].value] : []);
  const [state, setState] = React.useState('idle'); // idle | submitting | done | error
  const [errorDetail, setErrorDetail] = React.useState('');

  const validate = (v) => {
    if (!v) return 'Please enter your email.';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) return 'That email address looks incomplete.';
    return '';
  };

  const toggle = (v) => {
    setSelected(prev => prev.indexOf(v) === -1 ? [...prev, v] : prev.filter(x => x !== v));
  };

  const onSubmit = (e) => {
    e.preventDefault();
    const err = validate(email);
    if (err) { setEmailError(err); return; }
    setState('submitting');
    setErrorDetail('');
    // Simulate; ?simulateError=1 forces an error path
    const params = new URLSearchParams(window.location.search);
    const wantError = params.get('simulateError') === '1';
    setTimeout(() => {
      if (wantError) {
        setErrorDetail('Network error (simulated)');
        setState('error');
      } else {
        setState('done');
      }
    }, 400);
  };

  const retry = () => { setState('idle'); setErrorDetail(''); };

  if (state === 'done') {
    return (
      <div role="status" aria-live="polite" style={{
        padding: '20px 24px',
        background: 'var(--success-100)',
        border: '1px solid var(--success-500)',
        borderRadius: 'var(--radius-md, 6px)',
        color: 'var(--brand-primary-700)',
        fontSize: 15,
        lineHeight: 1.5
      }}>
        <div style={{
          fontFamily: 'var(--font-ui)',
          fontSize: 11, letterSpacing: '0.12em',
          textTransform: 'uppercase', fontWeight: 700,
          color: 'var(--success-500)', marginBottom: 6
        }}>✓ Subscribed</div>
        Thanks — you're on the list. The next briefing goes out at the start of next month.
      </div>
    );
  }

  return (
    <form onSubmit={onSubmit} noValidate style={{ display: 'flex', flexDirection: 'column', gap: 12, alignItems: 'stretch' }}>
      {state === 'error' && (
        <div role="alert" aria-live="assertive" style={{
          padding: '12px 16px',
          background: '#fef2f2',
          border: '1px solid var(--error-500)',
          borderRadius: 'var(--radius-md, 6px)',
          fontSize: 13, color: 'var(--fg-1)', textAlign: 'left'
        }}>
          <strong style={{ color: 'var(--error-500)' }}>Couldn't subscribe.</strong>{' '}
          Your address is preserved — try again, or email <code style={{ fontFamily: 'var(--font-mono)' }}>hello@medscihealthcare.com</code>.
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg-3)', marginTop: 4 }}>{errorDetail}</div>
          <button type="button" onClick={retry} style={{
            marginTop: 8, padding: '6px 14px',
            background: 'var(--error-500)', color: 'var(--bg-1)',
            border: 'none', borderRadius: 'var(--radius-md, 6px)',
            fontFamily: 'var(--font-ui)', fontSize: 12, fontWeight: 600,
            cursor: 'pointer'
          }}>Retry</button>
        </div>
      )}

      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
        <div style={{ flex: '1 1 240px', display: 'flex', flexDirection: 'column' }}>
          <input
            type="email"
            required
            aria-invalid={emailError ? 'true' : 'false'}
            aria-describedby="subscribe-email-error"
            placeholder="you@company.com"
            value={email}
            onChange={(e) => { setEmail(e.target.value); if (emailError) setEmailError(''); }}
            onBlur={() => setEmailError(validate(email))}
            disabled={state === 'submitting'}
            style={{
              padding: '12px 16px',
              border: '1px solid ' + (emailError ? 'var(--error-500)' : 'var(--border-2)'),
              background: 'var(--bg-1)',
              fontFamily: 'var(--font-ui)',
              fontSize: 15,
              color: 'var(--fg-1)'
            }}
          />
          {emailError && (
            <div id="subscribe-email-error" role="alert" style={{
              fontSize: 12, color: 'var(--error-500)', marginTop: 4,
              textAlign: 'left'
            }}>{emailError}</div>
          )}
        </div>
        <button type="submit" disabled={state === 'submitting'} aria-busy={state === 'submitting'} style={{
          padding: '12px 24px',
          background: state === 'submitting' ? 'var(--border-2)' : 'var(--brand-primary-700)',
          color: 'var(--bg-1)',
          border: 'none',
          fontFamily: 'var(--font-ui)',
          fontSize: 14,
          fontWeight: 600,
          letterSpacing: '0.04em',
          cursor: state === 'submitting' ? 'wait' : 'pointer',
          minWidth: 130
        }}>
          {state === 'submitting' ? 'Subscribing…' : 'Subscribe'}
        </button>
      </div>
      <div style={{ display: 'flex', gap: 16, justifyContent: 'center', flexWrap: 'wrap', fontSize: 13, color: 'var(--fg-2)' }}>
        <span style={{ fontSize: 11, color: 'var(--fg-3)', letterSpacing: '0.04em', alignSelf: 'center' }}>Topics (opt-in):</span>
        {topics.map(t => (
          <label key={t.value} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
            <input
              type="checkbox"
              checked={selected.indexOf(t.value) !== -1}
              onChange={() => toggle(t.value)}
              disabled={state === 'submitting'}
            />
            {t.label}
          </label>
        ))}
      </div>
    </form>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
