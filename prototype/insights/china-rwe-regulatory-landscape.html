const ARTICLE = {
  slug: "china-rwe-regulatory-landscape",
  topic: { value: "rwe", label: "China RWE" },
  title: "Evolving RWE Policies in China: What Global Sponsors Need to Know",
  lede: "Since 2019, China\u2019s NMPA and CDE have issued a series of guidelines that formalize how real-world evidence can support drug registration. We map the current policy landscape, highlight the key use cases Chinese regulators have accepted, and outline what this means for sponsors planning cross-border submissions.",
  author: { name: "Dr. L. Chen", title: "Medical Director, Evidence" },
  pitlReviewer: { name: "Dr. M. Park", title: "Senior Reviewer, PITL" },
  publishedAt: "2026-04-28",
  readingTime: "7 min read",
  sections: [
    {
      heading: "A regulatory framework taking shape",
      paragraphs: [
        "China\u2019s embrace of real-world evidence in drug regulation has moved faster than many global sponsors anticipated. Between 2019 and 2023, the National Medical Products Administration (NMPA) and its Center for Drug Evaluation (CDE) issued a cascade of guidelines establishing how RWD and RWE can support drug research, registration, and post-marketing surveillance. The 2019 document \u2014 Basic Considerations of Real-World Evidence Supporting Drug Research and Development \u2014 laid the conceptual foundation, followed by technical guidelines on data sources, study design, and statistical methods.",
        "This regulatory momentum was not isolated. It grew from the State Council\u2019s 2015\u20132016 Big Data Action Plan, which pushed the development and sharing of public health data resources. The establishment of ChinaREAL (China Real-World Data and Studies Alliance) and the Wu Jieping Medical Foundation\u2019s 2018 research guide signaled that the academic and clinical communities were building capacity in parallel with regulators."
      ]
    },
    {
      heading: "Key use cases Chinese regulators have accepted",
      paragraphs: [
        "Chinese regulatory authorities have recognized several distinct scenarios where RWE can supplement or, in some cases, substitute for traditional clinical trial data. These include post-marketing safety surveillance, expansion of indications for approved drugs, optimization of drug usage in clinical practice, and supportive evidence for new drug registrations \u2014 particularly for rare diseases and pediatric populations where traditional randomized controlled trials face enrollment challenges.",
        "The Hainan Boao Lecheng International Medical Tourism Pilot Zone has served as a particularly instructive sandbox. Since its designation as a \u2018medical special zone,\u2019 Lecheng has enabled real-world data collection from patients receiving overseas-approved therapies not yet registered in mainland China. This creates a controlled environment where regulators can assess both the therapy and the data infrastructure simultaneously."
      ]
    },
    {
      heading: "What this means for cross-border submissions",
      paragraphs: [
        "For global sponsors, China\u2019s evolving RWE framework creates both opportunity and complexity. On one hand, China-generated RWD from its massive hospital networks and registries can strengthen evidence packages for international submissions. On the other hand, data quality standards, interoperability with global standards like OMOP and CDISC, and the regulatory expectations around study design vary across jurisdictions.",
        "Our recommendation for sponsors planning cross-border RWE strategies: begin with a gap analysis between NMPA\u2019s evolving requirements and the standards expected by your target regulatory authorities (FDA, EMA, PMDA). Identify which data elements from Chinese sources meet those standards today, which can be re-derived, and which require supplemental collection. This mapping exercise, done early, can save months of rework downstream."
      ]
    },
  ],
  sources: [
    { label: "DIA Global Forum \u2014 Evolving Policies and Use of RWE in Regulatory Decisions in China", url: "https://globalforum.diaglobal.org/issue/july-2024/evolving-policies-and-use-of-rwe-in-regulatory-decisions-in-china/" },
    { label: "NMPA \u2014 State Council Opinions on Deepening Drug & Device Reform (2024)", url: "https://english.nmpa.gov.cn/2025-03/25/c_1080973.htm" },
    { label: "RWE Alliance \u2014 RWE Policy Developments", url: "https://rwealliance.org/rwe-policy-developments/" },
