  slug: "named-patient-programs-china",
  topic: { value: "china_access", label: "China Market Access" },
  title: "Named Patient Programs: A New Pathway into China for Innovative Therapies",
  lede: "Hainan\u2019s Boao Lecheng pilot zone and the 2019 Drug Administration Law have opened a named-patient route for overseas-approved drugs to reach Chinese patients before full NMPA registration. We examine how the pathway works, where it applies, and what global sponsors should prepare before filing.",
  author: { name: "Dr. S. Tan", title: "Medical Director, Market Access" },
  pitlReviewer: { name: "Dr. J. Wang", title: "Senior Reviewer, PITL" },
  publishedAt: "2026-04-14",
  readingTime: "6 min read",
  sections: [
    {
      heading: "The Boao Lecheng model: a medical special zone",
      paragraphs: [
        "Hainan\u2019s Boao Lecheng International Medical Tourism Pilot Zone is not just another free trade experiment \u2014 it is a purpose-built regulatory sandbox for medical innovation. With over 30 private specialty hospitals and dedicated medical service centers, Lecheng allows hospitals to import and administer overseas-approved drugs and devices that have not yet received NMPA registration, provided the therapy addresses a condition without adequate domestic alternatives.",
        "For global sponsors, Lecheng offers a controlled first-mover advantage: the ability to generate real-world data on Chinese patients receiving your therapy, build clinical familiarity among Chinese physicians, and establish a commercial presence \u2014 all before completing the full NMPA registration pathway. The data generated at Lecheng can also feed into your broader RWE portfolio for use in regulatory submissions to other authorities."
      ]
    },
    {
      heading: "Nationwide named patient provisions under the 2019 Drug Administration Law",
      paragraphs: [
        "Beyond Lecheng, the 2019 Drug Administration Law (Article 23 and related NHC/NMPA implementation guidance from June 2022) established a nationwide framework for named-patient imports. Hospitals with ethics committee approval can obtain provincial one-off import permits for overseas-approved drugs to treat individual patients with life-threatening or rare diseases that lack domestic treatment options.",
        "The practical threshold is significant: the treating physician must demonstrate that no registered alternative exists in China, the hospital\u2019s ethics committee must approve the specific case, and the provincial authority must issue a one-off import permit. For sponsors, this means the named-patient pathway works best for products with clear differentiation from anything currently available in the Chinese market \u2014 particularly in oncology, rare diseases, and advanced cell and gene therapies."
      ]
    },
    {
      heading: "Practical preparation for global sponsors",
      paragraphs: [
        "Sponsors considering the named-patient route into China should prepare three work streams in parallel. First, regulatory mapping: identify which of your pipeline assets have the clearest case for \u2018no domestic alternative\u2019 status and prepare the supporting evidence. Second, logistics and supply chain: named-patient imports require cold-chain documentation, import permits at the shipment level, and compliance with China\u2019s strict biosample regulations \u2014 particularly for cell and gene therapies involving human biological materials.",
        "Third, data strategy: every named-patient administration is a potential data point. Design your pharmacovigilance and outcomes tracking from day one to ensure the data generated is useful for your broader development program. Sponsors who treat named-patient programs as isolated compassionate-use exercises miss the strategic value; those who integrate them into their evidence generation plan gain a compounding advantage."
      ]
    },
  ],
  sources: [
    { label: "ACA Pharma \u2014 Named Patient Program Overview for China", url: "https://acapharma.net/named-patient-program-overview-for-china/" },

  ],
