const ARTICLE = {
  slug: "bridging-china-data-fda",
  topic: { value: "evidence_bridge", label: "FDA Evidence Bridge" },
  title: "Bridging China-Generated Data to an FDA Submission: A Field Checklist",
  lede: "China\u2019s 2024 State Council reform opinions accelerated clinical trial approvals from 60 to 30 working days and endorsed international multi-center trials. For sponsors bridging Chinese data into U.S. submissions, these changes rewrite the playbook. We share the gating questions our reviewers run before a U.S.-facing dossier gets drafted.",
  author: { name: "Dr. R. Iyer", title: "Medical Director, U.S. Programs" },
  pitlReviewer: { name: "Dr. K. Liu", title: "Senior Reviewer, PITL" },
  publishedAt: "2026-04-21",
  readingTime: "8 min read",
  sections: [
    {
      heading: "The reform landscape reshaping cross-border data",
      paragraphs: [
        "In December 2024, China\u2019s State Council issued Guo Ban Fa No. 53, a comprehensive set of reform opinions that touch nearly every aspect of drug and medical device regulation. For sponsors planning FDA submissions with Chinese data, three provisions stand out: the reduction of clinical trial review timelines from 60 to 30 working days, explicit support for international multi-center clinical trials, and the promotion of alignment with ICH guidelines.",
        "These reforms are not symbolic. They create a regulatory environment where Chinese clinical sites can participate earlier in global development programs, generate data under harmonized standards, and deliver datasets that travel more cleanly to FDA review rooms. However, the structural opportunity does not eliminate the bridging work \u2014 it changes what that work looks like."
      ]
    },
    {
      heading: "Four gating questions before drafting a U.S.-facing dossier",
      paragraphs: [
        "Our review team applies four questions to every China-sourced dataset before it enters a U.S. submission draft. First, does the study population align with the U.S. target population in demographics, comorbidities, and standard of care? Chinese tertiary center populations often skew younger and have different comorbidity profiles than U.S. cohorts. Second, are the comparators used in Chinese trials available and approved in the U.S.? A head-to-head trial against a therapy not marketed in the U.S. has limited value for FDA reviewers.",
        "Third, do the endpoints and outcome definitions map to FDA-recognized standards? Chinese oncology trials, for example, may use response criteria or follow-up schedules that differ from U.S. conventions. Fourth, was the data collected under GCP standards that FDA will accept without qualification? The 2024 reforms push for ICH alignment, but implementation varies by site and sponsor. Answering these four questions early determines whether a dataset is a bridge asset or a re-derivation project."
      ]
    },
    {
      heading: "Where bridges most often fail",
      paragraphs: [
        "In our experience across dozens of cross-border programs, the three most common failure points are population alignment (cited in roughly 40% of FDA feedback letters involving Chinese data), endpoint definition gaps (particularly in oncology and cardiovascular indications), and documentation of GCP compliance at individual sites. Each of these is addressable \u2014 but addressing them after the dossier is drafted costs three to five times more than building the bridge plan upfront.",
        "The practical takeaway: treat the bridging assessment as a standalone work product, not an afterthought in the regulatory strategy. A two-week bridging audit before dossier drafting begins can save six months of downstream revision. Our team runs this as a structured sprint, producing a gap analysis and remediation plan that regulatory, medical, and biostatistics teams can execute in parallel."
      ]
    },
  ],
  sources: [
    { label: "NMPA \u2014 State Council Opinions on Deepening Drug & Device Reform (2024)", url: "https://english.nmpa.gov.cn/2025-03/25/c_1080973.htm" },
    { label: "DIA Global Forum \u2014 Evolving Policies and Use of RWE in Regulatory Decisions in China", url: "https://globalforum.diaglobal.org/issue/july-2024/evolving-policies-and-use-of-rwe-in-regulatory-decisions-in-china/" },
