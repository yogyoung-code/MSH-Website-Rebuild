<style>
  :root {
    --font-display: "Footlight MT Light", "Footlight MT", "Source Serif 4", Georgia, serif;
    --font-slogan: "Footlight MT Light", "Footlight MT", Georgia, serif;
  }
html, body { margin: 0; padding: 0; background: var(--bg-1); color: var(--fg-1); font-family: var(--font-ui); }

  a { color: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<!-- GA4 + consent-mode v2 (Plan task 15) -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }
  gtag('js', new Date());
  // gtag('config', 'G-XXXXXX'); // launch 前替换
</script>

<script src="assets/vendor/lucide.min.js"></script>

<script type="text/babel" src="components/Button.jsx"></script>

<script type="text/babel" src="components/ContentBlocks.jsx"></script>
<script type="text/babel" src="components/SmartForm.jsx"></script>

<script type="text/babel">
// v3.0 — 解析 URL ?intent= 让 contact 页面识别 AI Platform routed intents
// (ai_notify_me / ai_product_access / ai_reverse_dd) 并切换 hero copy + 把
// routedIntent 透传给 SmartForm。
const AI_INTENT_HEROS = {
  ai_notify_me: {
    eyebrow: 'AI PLATFORM · COMING SOON',
    title: 'Notify me when the next AI product launches.',
    body: "We'll send one email when Limited Preview opens. No marketing list, no nurture sequence — just the launch alert.",
  },
  ai_product_access: {
    eyebrow: 'AI PLATFORM · LIMITED PREVIEW',
    title: 'Apply for AI product Limited Preview.',
    body: 'Limited Preview is open to clinicians and research teams under engagement. We review applications within 5 business days.',
  },
  ai_reverse_dd: {
    eyebrow: 'AI PLATFORM · REVERSE-DD',
    title: 'Talk to our AI team.',
    body: 'Reverse-due-diligence readout, technical deep-dive, or partnership exploration. Our AI team will reply within 2 business days.',
  },
};

function getRoutedIntent() {
  if (typeof window === 'undefined') return null;
  const m = window.location.search.match(/[?&]intent=([^&]+)/);
  if (!m) return null;
  const v = decodeURIComponent(m[1]);
  return AI_INTENT_HEROS[v] ? v : null;
}

function App() {
  const routedIntent = getRoutedIntent();
  const aiHero = routedIntent ? AI_INTENT_HEROS[routedIntent] : null;

  return (
    <PageShell hideHero breadcrumbs={[
      { label: 'Home', href: '/' },
      { label: 'Contact' }
    ]}>
      {/* Hero */}
      <section style={{
        maxWidth: 880,
        margin: '0 auto',
        padding: 'clamp(48px, 6vw, 96px) clamp(24px, 6vw, 96px) 32px'
      }}>
        <div style={{
          fontFamily: 'var(--font-slogan)',
          fontSize: 12,
          letterSpacing: '0.16em',
          textTransform: 'uppercase',
          color: 'var(--brand-accent-700)',
          marginBottom: 16
        }}>{aiHero ? aiHero.eyebrow : 'Contact MedSci Healthcare'}</div>

        <h1 style={{
          fontFamily: 'var(--font-display)',
          fontSize: 'clamp(32px, 5vw, 48px)',
          lineHeight: 1.2,
          color: 'var(--brand-primary-700)',
          margin: '0 0 20px'
        }}>{aiHero ? aiHero.title : 'Talk to a physician on our team.'}</h1>

        <p style={{
          fontSize: 17,
          color: 'var(--fg-1)',
          lineHeight: 1.6,
          margin: 0,
          maxWidth: 720
        }}>
          {aiHero
            ? aiHero.body
            : "Tell us a bit about what you're working on. We route by business block — Evidence, Physician Engagement, Communications, AI Platform — and the same person who reaches out is on the deliverable when work begins."
          }
        </p>
      </section>

      {/* Form */}
      <section style={{ padding: '0 0 64px' }}>
        <SmartForm routedIntent={routedIntent} />
      </section>

      {/* Side info: routing transparency + alt channels */}
      <section style={{
        maxWidth: 720,
        margin: '0 auto',
        padding: '0 clamp(24px, 6vw, 96px) 96px'
      }}>
        <div style={{
          borderTop: '1px solid var(--border-1)',
          paddingTop: 32,
          fontSize: 14,
          color: 'var(--fg-2)',
          lineHeight: 1.6
        }}>
          <div style={{
            fontFamily: 'var(--font-slogan)',
            fontSize: 12,
            letterSpacing: '0.12em',
            textTransform: 'uppercase',
            color: 'var(--brand-primary-700)',
            marginBottom: 12
          }}>How we route this</div>

          <p style={{ margin: '0 0 12px' }}>
            Pilot and Expert intents go to BD by business block. RFP intent routes to our formal-proposal queue. Investor and Press inquiries are best routed through their dedicated channels below.
          </p>

          <ul style={{ listStyle: 'none', padding: 0, margin: '20px 0 0' }}>
            <li style={{ marginBottom: 8 }}>
              → Investor Relations (HKEX 2415.HK):{' '}
              <a href="https://ir.medsci.cn/en/" rel="external noopener" style={{ color: 'var(--fg-link)', textDecoration: 'underline' }}>
                ir.medsci.cn/en/
              </a>
            </li>
            <li style={{ marginBottom: 8 }}>
              → Press &amp; Media: select <em>Other</em> above and mention your outlet and deadline.
            </li>
            <li style={{ marginBottom: 8 }}>
              → Compliance / vendor security pack: select <em>Other</em> above and describe your audit context.
            </li>
            <li style={{ marginBottom: 0 }}>
              → Existing engagement &amp; account questions: please use the email thread from your engagement letter.
            </li>
          </ul>
        </div>
      </section>
    </PageShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
