<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact MedSci Healthcare — Talk to an Expert</title>
<meta name="description" content="Reach a physician on our team for a 30-minute scoping call. We route by topic to evidence, engagement, communications, AI Platform, IR, or compliance.">
<link rel="canonical" href="https://medscihealthcare.com/contact">
<link rel="alternate" hreflang="en" href="https://medscihealthcare.com/contact">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Contact MedSci Healthcare — Talk to an Expert">
<meta property="og:description" content="Reach a physician on our team for a 30-minute scoping call. We route by topic to the right MedSci team.">
<meta property="og:image" content="https://medscihealthcare.com/assets/og/contact-1200x630.png">
<meta property="og:url" content="https://medscihealthcare.com/contact">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="assets/colors_and_type.css">
<link rel="stylesheet" href="assets/responsive.css">
<link rel="icon" type="image/svg+xml" href="assets/logo/medsci-healthcare-mark.svg">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ContactPage",
  "name": "Contact MedSci Healthcare",
  "url": "https://medscihealthcare.com/contact",
  "publisher": {
    "@type": "Organization",
    "name": "MedSci Healthcare",
    "url": "https://medscihealthcare.com",
    "tickerSymbol": "2415.HK"
  }
}
</script>
<style>
  :root {
    --font-display: "Footlight MT Light", "Footlight MT", "Source Serif 4", Georgia, serif;
    --font-slogan: "Footlight MT Light", "Footlight MT", Georgia, serif;
  }
html, body { margin: 0; padding: 0; background: var(--bg-1); color: var(--fg-1); font-family: var(--font-ui); }
  *, *::before, *::after { box-sizing: border-box; }
  a { color: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<!-- GA4 + consent-mode v2 (Plan task 15) -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }
  gtag('js', new Date());

</script>
<script src="assets/consent/consent-mode-v2.js"></script>
<script src="assets/analytics/ga4-events.js"></script>

<script src="assets/vendor/react.development.js"></script>
<script src="assets/vendor/react-dom.development.js"></script>
<script src="assets/vendor/babel.min.js"></script>
<script src="assets/vendor/lucide.min.js"></script>
<!-- Sanity CMS integration -->
<script src="https://cdn.jsdelivr.net/npm/@sanity/client@6/dist/sanityClient.browser.min.js"></script>
<script src="assets/sanity-client.js"></script>

<script type="text/babel" src="components/Button.jsx"></script>
<script type="text/babel" src="components/Header.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>
<script type="text/babel" src="components/PageShell.jsx"></script>
<script type="text/babel" src="components/ContentBlocks.jsx"></script>
<script type="text/babel" src="components/SmartForm.jsx"></script>

<script type="text/babel">
// v3.0 — 解析 URL ?intent= 让 contact 页面识别 AI Platform routed intents
// (ai_notify_me / ai_product_access / ai_reverse_dd) 并切换 hero copy + 把
// routedIntent 透传给 SmartForm。
const AI_INTENT_HEROS = {
  ai_notify_me: {
    eyebrow: 'AI PLATFORM · COMING SOON',
    title: 'Notify me when the next AI product launches.',
    body: "We'll send one email when Limited Preview opens. No marketing list, no nurture sequence — just the launch alert.",
  },
  ai_product_access: {
    eyebrow: 'AI PLATFORM · LIMITED PREVIEW',
    title: 'Apply for AI product Limited Preview.',
    body: 'Limited Preview is open to clinicians and research teams under engagement. We review applications within 5 business days.',
  },
  ai_reverse_dd: {
    eyebrow: 'AI PLATFORM · REVERSE-DD',
    title: 'Talk to our AI team.',
    body: 'Reverse-due-diligence readout, technical deep-dive, or partnership exploration. Our AI team will reply within 2 business days.',
  },
};

function getRoutedIntent() {
  if (typeof window === 'undefined') return null;
  const m = window.location.search.match(/[?&]intent=([^&]+)/);
  if (!m) return null;
  const v = decodeURIComponent(m[1]);
  return AI_INTENT_HEROS[v] ? v : null;
}

function App() {
  const routedIntent = getRoutedIntent();
  const aiHero = routedIntent ? AI_INTENT_HEROS[routedIntent] : null;

  return (
    <PageShell hideHero breadcrumbs={[
      { label: 'Home', href: '/' },
      { label: 'Contact' }
    ]}>
      {/* Wide two-column layout */}
      <section style={{
        maxWidth: 1280,
        margin: '0 auto',
        padding: 'clamp(48px, 6vw, 96px) clamp(16px, 4vw, 40px) 64px',
      }}>
        <div className="two-col-grid" style={{
          display: 'grid',
          gridTemplateColumns: '1fr 1.1fr',
          gap: 'clamp(40px, 5vw, 80px)',
          alignItems: 'start',
        }}>
          {/* LEFT — copy + routing info */}
          <div>
            <div style={{
              fontFamily: 'var(--font-slogan)',
              fontSize: 12,
              letterSpacing: '0.16em',
              textTransform: 'uppercase',
              color: 'var(--brand-accent-700)',
              marginBottom: 16
            }}>{aiHero ? aiHero.eyebrow : 'Contact MedSci Healthcare'}</div>

            <h1 style={{
              fontFamily: 'var(--font-display)',
              fontSize: 'clamp(32px, 4vw, 44px)',
              lineHeight: 1.2,
              color: 'var(--brand-primary-700)',
              margin: '0 0 20px'
            }}>{aiHero ? aiHero.title : 'Talk to an expert on our team.'}</h1>

            <p style={{
              fontSize: 16,
              color: 'var(--fg-1)',
              lineHeight: 1.65,
              margin: '0 0 40px',
            }}>
              {aiHero
                ? aiHero.body
                : "Tell us a bit about what you're working on. We route by business block — Evidence, Physician Engagement, Communications, AI Platform — and the same person who reaches out is on the deliverable when work begins."
              }
            </p>

            {/* Routing transparency */}
            <div style={{
              borderTop: '1px solid var(--border-1)',
              paddingTop: 28,
              fontSize: 14,
              color: 'var(--fg-2)',
              lineHeight: 1.6,
            }}>
              <div style={{
                fontFamily: 'var(--font-slogan)',
                fontSize: 11,
                letterSpacing: '0.12em',
                textTransform: 'uppercase',
                color: 'var(--brand-primary-700)',
                marginBottom: 12,
                fontWeight: 600,
              }}>How we route this</div>

              <p style={{ margin: '0 0 16px', fontSize: 14 }}>
                Pilot and Expert intents go to BD by business block. RFP intent routes to our formal-proposal queue.
              </p>

              <ul style={{ listStyle: 'none', padding: 0, margin: '0 0 0' }}>
                <li style={{ marginBottom: 10, fontSize: 13 }}>
                  → Investor Relations (HKEX 2415.HK):{' '}
                  <a href="https://ir.medsci.cn/en/" rel="external noopener" style={{ color: 'var(--fg-link)', textDecoration: 'underline' }}>
                    ir.medsci.cn/en/
                  </a>
                </li>
                <li style={{ marginBottom: 10, fontSize: 13 }}>
                  → Press &amp; Media: select <em>Other</em> and mention your outlet and deadline.
                </li>
                <li style={{ marginBottom: 10, fontSize: 13 }}>
                  → Compliance / vendor security pack: select <em>Other</em> and describe your audit context.
                </li>
                <li style={{ marginBottom: 0, fontSize: 13 }}>
                  → Existing engagement: please use the email thread from your engagement letter.
                </li>
              </ul>
            </div>
          </div>

          {/* RIGHT — form */}
          <div style={{
            background: 'var(--bg-2)',
            borderRadius: 16,
            border: '1px solid var(--border-1)',
            padding: 'clamp(24px, 3vw, 40px)',
            '--form-max-width': 'none',
            '--form-padding': '0px',
          }}>
            <SmartForm routedIntent={routedIntent} />
          </div>
        </div>
      </section>

      {/* Office photo */}
      <section style={{
        maxWidth: 1280,
        margin: '0 auto',
        padding: '0 clamp(16px, 4vw, 40px) clamp(64px, 8vw, 96px)',
      }}>
        <div style={{
          borderRadius: 12,
          overflow: 'hidden',
          border: '1px solid var(--border-1)',
          position: 'relative',
        }}>
          <picture>
            <source srcSet="assets/photos/hq-night.jpg" media="(prefers-color-scheme: dark)" />
            <img
              src="assets/photos/hq-day.jpg"
              alt="MedSci Healthcare US office — Irvine, California"
              loading="lazy"
              width="1280"
              height="540"
              style={{
                display: 'block',
                width: '100%',
                height: 'clamp(200px, 30vw, 400px)',
                objectFit: 'cover',
                objectPosition: 'center 40%',
              }}
            />
          </picture>
          <div style={{
            position: 'absolute',
            bottom: 0,
            left: 0,
            right: 0,
            padding: '24px 28px 20px',
            background: 'linear-gradient(transparent, rgba(0,0,0,0.55))',
            color: 'var(--white)',
            fontSize: 13,
            fontFamily: 'var(--font-ui)',
            letterSpacing: '0.04em',
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'flex-end',
          }}>
            <span>Irvine, California — US Operations</span>
            <span style={{ opacity: 0.7, fontSize: 11 }}>MedSci Healthcare</span>
          </div>
        </div>
      </section>

    </PageShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
