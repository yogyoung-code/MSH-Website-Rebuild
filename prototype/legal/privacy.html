 { id: 'who-we-are', heading: '1. Who we are',
 paragraphs: [<span>MedSci Healthcare Holdings Limited (梅斯健康控股有限公司, HKEX: 2415) is the controller (or "personal information handler" under PIPL) of personal information collected through medscihealthcare.com (the "Site"). Our operating subsidiary, Shanghai MedSci MedTech Co., Ltd. (上海梅斯医药科技有限公司), may process data on our behalf. Contact: <code>privacy@medscihealthcare.com</code> or use <a href="/contact.html" style={{ color: 'var(--fg-link)', textDecoration: 'underline' }}>Contact</a> and select "Legal / Compliance". Postal address: 18F, Building 34, Songjiang Caohejing Development Zone, No. 518 Xinqiao Shenzhuan Road, Songjiang District, Shanghai, China.</span>] },
 { id: 'jurisdictional-scope', heading: '1A. Jurisdictional scope of this policy',

 'MedSci Healthcare operates across multiple jurisdictions and provides services to clients globally. The data protection laws and regulations that apply to the processing of your personal information depend on where you are located, where business activities take place, and where data is stored or transferred. This Privacy Policy is designed to meet or exceed the requirements of applicable data protection regimes in the jurisdictions where we operate, including but not limited to:',
 '(a) The Personal Information Protection Law (PIPL) of the People\'s Republic of China — applies to personal information of individuals located in mainland China, and to the processing of mainland China residents\' personal information by any entity regardless of location (see Section 5 below).',

 { id: 'sharing', heading: '6. How we share',

 { id: 'retention', heading: '7. Retention',

 { id: 'rights', heading: '8. Your rights',
