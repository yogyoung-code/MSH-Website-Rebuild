/* ── Final · Dual CTA (carried over from v3) ──────────────── */

      background: 'var(--bg-2, var(--neutral-50))',
      borderTop: '1px solid var(--border-1)',
    }}>
      <div className="aips4-final-cta-grid" style={{
        maxWidth: 'var(--container-max, 1280px)',
        margin: '0 auto',
        display: 'grid',
        gridTemplateColumns: '1fr',
        gap: 'clamp(24px, 3vw, 40px)',
      }}>
        <CTAColumn
          eyebrow="FOR CLINICIANS & RESEARCHERS"
          title="Try the products"
          body="Limited Preview · Apply for access to DeepEvidence, SeekEvidence, or notify me when the next product ships."
          ctaLabel="Apply for access →"
          ctaHref="/contact.html?intent=ai_product_access"
          accent="primary"
        />
        <CTAColumn
          eyebrow="FOR INVESTORS & PARTNERS"
          title="Talk to our AI team"
          body="Reverse-DD readout, technical deep-dive, or partnership exploration."
          ctaLabel="Schedule a session →"
          ctaHref="/contact.html?intent=ai_reverse_dd"
          accent="dark"
        />
      </div>
      <style>{`
        @media (min-width: 1024px) {
          .aips4-final-cta-grid { grid-template-columns: 1fr 1fr !important; }
        }
      `}</style>
    </section>
  );
}

function CTAColumn({ eyebrow, title, body, ctaLabel, ctaHref, accent }) {
  const isDark = accent === 'dark';
  return (
    <div style={{
      padding: 'clamp(24px, 3vw, 40px)',
      borderRadius: 16,
      background: isDark ? 'var(--brand-primary-900)' : 'var(--bg-1)',
      border: isDark ? 'none' : '1px solid var(--border-1)',
      color: isDark ? 'var(--white)' : 'var(--fg-1)',
      display: 'flex', flexDirection: 'column', gap: 16,
    }}>
      <div style={{
        fontFamily: 'var(--font-ui)', fontSize: 11,
        letterSpacing: '0.14em', textTransform: 'uppercase',
        color: isDark ? 'var(--brand-accent-500)' : 'var(--brand-accent-700)',
        fontWeight: 700,
      }}>{eyebrow}</div>
      <h3 style={{
        fontFamily: 'var(--font-display)',
        fontSize: 'clamp(24px, 2.8vw, 32px)',
        fontWeight: 600,
        margin: 0, lineHeight: 1.2,
        color: isDark ? 'var(--white)' : 'var(--brand-primary-700)',
      }}>{title}</h3>
      <p style={{
        margin: 0,
        fontSize: 14, lineHeight: 1.6,
        color: isDark ? 'rgba(255,255,255,0.78)' : 'var(--fg-2)',
        maxWidth: 480,
      }}>{body}</p>
      <div style={{ marginTop: 'auto', paddingTop: 8 }}>
        <a href={ctaHref} style={{
          display: 'inline-flex', alignItems: 'center', gap: 8,
          padding: '14px 28px', borderRadius: 10,
          background: isDark ? 'var(--white)' : 'var(--brand-primary-700)',
          color: isDark ? 'var(--brand-primary-700)' : 'var(--white)',
          fontFamily: 'var(--font-ui)', fontSize: 14, fontWeight: 700,
          textDecoration: 'none',
        }}>{ctaLabel}</a>
      </div>
    </div>
  );
}

/* ── App ─────────────────────────────────────────────────── */

    const t = setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
    return () => clearTimeout(t);

  return (
    <PageShell hero={<V4Hero />}>
      {/* UXcritique: StickyAnchorNav removed (same reason as v3). */}

      <section id="foundation">
        <AIAssetBalanceSheet
          eyebrow="THE NUMBERS BEHIND THE PLATFORM"
          subtitle="AS OF 2026 Q1 · IR-VERIFIED"
          groups={ASSET_GROUPS}
          narrative={ASSET_NARRATIVE}

      <section id="products">
        <AIProductSpec
          eyebrow="AI PRODUCTS"
          title="Two engines today. More arriving."
          lede="Each product reads as a contract: what you ask, what ships, what it's anchored to. Same audited evidence stack you saw above."

      <section id="method">

          eyebrow="ACT 3 · THE METHOD"
          title="How we keep medical AI accountable."
          pitlSteps={PITL_STEPS}
          evidenceRows={EVIDENCE_ROWS}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
