        <p>A Global Top-10 medtech preparing for China entry had a strong international evidence stack but no clear path to NMPA-relevant claims, no segmented HCP map, and no localized communication assets. The internal team needed an independent evidence + HCP package they could put on a regulator's desk and on a KOL's screen — within one fiscal year.</p>

      </ProseBlock>
      <ProseBlock heading="Outcome" anchor="outcome">
        <p>The client received a regulator-ready evidence dossier with full source trail, a physician-validated HCP map, and a content kit signed off by both EN and CN reviewer tracks. The China entry plan moved from internal debate to NMPA pre-submission within the engagement window.</p>
      </ProseBlock>

        eyebrow="OUTCOMES — VERIFIED + PENDING"
        title="What we shipped — and where the audit trail stands."
        rows={[
