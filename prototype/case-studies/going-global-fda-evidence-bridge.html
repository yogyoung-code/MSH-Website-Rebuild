        <p>A China-headquartered bio-tech with strong domestic phase-3 data needed an FDA-facing evidence bridge: a structured assessment of which data would translate to U.S. regulatory expectations, what publication strategy could establish U.S.-facing scientific visibility, and what English-language MSL kit the U.S. medical team would need.</p>
      </ProseBlock>
      <ProseBlock heading="Approach" anchor="approach">
        <p>MedSci built three parallel workstreams gated by PITL: (1) gap assessment between China-generated data and FDA expectations, with named reviewers signing each comparability claim; (2) AI-assisted manuscript and abstract drafting for U.S.-facing congresses and journals, with full audit trails; (3) English-language MSL deck and HCP material development reviewed by U.S. clinicians.</p>
      </ProseBlock>
      <ProseBlock heading="Outcome" anchor="outcome">
        <p>The client reached FDA-ready evidence package status 8 months ahead of the originally planned timeline. Three peer-reviewed publication submissions and two U.S. congress abstracts were prepared in parallel, with full source trails attached. The U.S. medical team had a physician-validated kit ready before commercial planning began.</p>
      </ProseBlock>
      <EvidenceTrail
        eyebrow="OUTCOMES — VERIFIED + PENDING"
        title="What we shipped — and where the audit trail stands."
        rows={[

            trace: ['AI: literature retrieval', 'AI: draft + citation slots', 'MD: U.S.-clinician review'],
            source: 'Publication tracker', year: '2025', approvedBy: 'Sponsor (pending)' },
          { claim: '2 congress abstracts accepted (ASCO, AHA)',
